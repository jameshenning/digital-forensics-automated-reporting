{% extends "base.html" %}
{% block title %}DFARS - Report Preview{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4><i class="bi bi-file-earmark-text"></i> Report Preview: {{ case.case_id }}</h4>
    <div class="btn-group">
        <a href="{{ url_for('dfars.download_report', case_id=case.case_id, fmt='markdown') }}" class="btn btn-accent"><i class="bi bi-download"></i> Download Markdown</a>
        <a href="{{ url_for('dfars.download_report', case_id=case.case_id, fmt='json') }}" class="btn btn-outline-info"><i class="bi bi-filetype-json"></i> Download JSON</a>
        <a href="{{ url_for('dfars.view_case', case_id=case.case_id) }}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Back</a>
    </div>
</div>
<div class="report-preview">{{ report }}</div>
{% endblock %}
